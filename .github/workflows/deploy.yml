name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write   # required for OIDC -> AWS role assumption
  contents: read

env:
  AWS_REGION: us-west-2
  PROJECT_NAME: slack-mcp

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.12.1"

      - name: Terraform init
        working-directory: terraform
        run: tofu init

      - name: Terraform apply -- ECR repo only (must exist before the image push)
        working-directory: terraform
        run: tofu apply -auto-approve -target=aws_ecr_repository.this -target=aws_ecr_repository_policy.lambda_pull

      - name: Get ECR repository URL
        id: ecr
        working-directory: terraform
        run: echo "url=$(tofu output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        run: |
          docker build --provenance=false -t "${{ steps.ecr.outputs.url }}:latest" -f server/Dockerfile .
          docker push "${{ steps.ecr.outputs.url }}:latest"

      - name: Terraform apply -- everything else (Lambda, API Gateway, AgentCore Gateway, IAM)
        working-directory: terraform
        run: tofu apply -auto-approve

      - name: Update Lambda to the freshly pushed image
        working-directory: terraform
        run: |
          function_name=$(tofu output -raw lambda_function_name)
          aws lambda update-function-code \
            --function-name "$function_name" \
            --image-uri "${{ steps.ecr.outputs.url }}:latest"
          aws lambda wait function-updated --function-name "$function_name"
